    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0f19;
        }
        .serif-title {
            font-family: 'Playfair Display', serif;
        }
        .blur-backdrop {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen selection:bg-amber-500 selection:text-black">

    <header class="relative h-[45vh] flex items-center justify-center overflow-hidden bg-cover bg-center" style="background-image: linear-gradient(to bottom, rgba(11, 15, 25, 0.3), #0b0f19), url('https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=1200&q=80');">
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="relative z-10 text-center px-4">
            <span class="text-amber-400 font-semibold tracking-widest text-xs uppercase bg-amber-400/10 px-3 py-1 rounded-full border border-amber-400/20">Shije Tradicionale</span>
            <h1 class="serif-title text-4xl md:text-6xl font-bold mt-3 text-white tracking-wide">SHKARA & MË SHUMË</h1>
            <p class="text-gray-300 text-sm md:text-base mt-2 max-w-md mx-auto font-light">Eksperiencë unike e shijes, me mish të freskët dhe produkte cilësore.</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-24">
        
        <div class="flex gap-2 overflow-x-auto pb-4 mb-10 border-b border-gray-800 scrollbar-none sticky top-0 bg-[#0b0f19]/90 z-40 py-4 blur-backdrop">
            <button onclick="filterMenu('all')" class="cat-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all bg-amber-500 text-black shadow-lg shadow-amber-500/20 whitespace-nowrap">Të gjitha</button>
            <button onclick="filterMenu('kafe')" class="cat-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all bg-gray-900 text-gray-400 hover:text-white border border-gray-800 whitespace-nowrap">☕ Kafe & Çaj</button>
            <button onclick="filterMenu('pije')" class="cat-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all bg-gray-900 text-gray-400 hover:text-white border border-gray-800 whitespace-nowrap">🥤 Pije të Ftohta</button>
            <button onclick="filterMenu('alkool')" class="cat-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all bg-gray-900 text-gray-400 hover:text-white border border-gray-800 whitespace-nowrap">🍺 Pije Alkoolike</button>
            <button onclick="filterMenu('gjelle')" class="cat-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all bg-gray-900 text-gray-400 hover:text-white border border-gray-800 whitespace-nowrap">🍲 Tradicionale</button>
            <button onclick="filterMenu('skara')" class="cat-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all bg-gray-900 text-gray-400 hover:text-white border border-gray-800 whitespace-nowrap">🥩 Skara</button>
            <button onclick="filterMenu('kombinim')" class="cat-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all bg-gray-900 text-gray-400 hover:text-white border border-gray-800 whitespace-nowrap">🍱 Kombinime</button>
        </div>

        <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </main>

            { name: "Kombinim Premium", price: 8.00, category: "kombinim", img: "https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=400&q=80" },
            { name: "Kombinim XL Super", price: 10.00, category: "kombinim", img: "https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=400&q=80" }
        ];

        function displayMenu(items) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-gradient-to-r from-gray-900 to-gray-950 rounded-2xl overflow-hidden border border-gray-800 hover:border-amber-500/30 transition-all duration-300 flex items-center p-4 gap-4 shadow-md group";
                card.innerHTML = `
                    <img src="${item.img}" alt="${item.name}" class="w-20 h-20 md:w-24 md:h-24 object-cover rounded-xl group-hover:scale-105 transition-transform duration-300 bg-gray-800">
                    <div class="flex-1">
                        <h3 class="text-white font-semibold text-base md:text-lg tracking-wide">${item.name}</h3>
                        <p class="text-xs text-gray-500 capitalize mt-0.5">Kategoria: ${item.category}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-amber-400 font-bold text-lg md:text-xl">${item.price.toFixed(2)} €</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterMenu(category) {
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => btn.className = "cat-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all bg-gray-900 text-gray-400 hover:text-white border border-gray-800 whitespace-nowrap");
            
            // Highlight chosen tab
            if (event && event.target) {
                event.target.className = "cat-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all bg-amber-500 text-black shadow-lg shadow-amber-500/20 whitespace-nowrap";
            }

            if(category === 'all') { displayMenu(menuData); } 
            else { displayMenu(menuData.filter(item => item.category === category)); }
        }

        window.onload = () => { displayMenu(menuData); };
    </script>
</body>
</html>
